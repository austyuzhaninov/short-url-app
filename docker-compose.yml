version: '3.8'

services:
  url-shortener:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: url-shortener
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=${PORT:-8080}
      - STORAGE_FILE=/root/data/storage.json
      - BASE_URL=${BASE_URL:-http://localhost:8080}
      - READ_TIMEOUT=${READ_TIMEOUT:-30}
      - WRITE_TIMEOUT=${WRITE_TIMEOUT:-30}
    volumes:
      - ./data:/root/data # для хранения файлов в контейнере
    restart: unless-stopped